spring:
  datasource:
    url: jdbc:sqlite:example/src/main/resources/data/app.sqlite3?foreign_keys=on
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.community.dialect.SQLiteDialect

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

  data:
    admin:
      enabled: true
      base-path: /admin
      ui:
        title: My Admin
      pagination:
        default-size: 25
        max-size: 200
