<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} ?: 'Admin'">Admin</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen bg-gray-50 text-gray-900 overflow-x-hidden overflow-y-hidden">
<!-- Fixed Header -->
<header class="fixed top-0 left-0 right-0 z-30 bg-gray-800 text-white">
    <div class="mx-auto max-w-screen-2xl px-4 py-3 flex items-center justify-between">
        <a class="flex items-center gap-2" th:href="${basePath}">
            <span class="font-semibold" th:text="${title} ?: 'Admin'">Admin</span>
        </a>
        <div class="text-sm text-gray-300">Pale Blue Spring Admin</div>
    </div>
</header>

<!-- App Shell: fixed sidebar + scrollable content -->
<div class="pt-[56px] h-full">
    <div class="mx-auto max-w-screen-2xl px-4 h-full flex gap-6">
        <!-- Fixed Sidebar (desktop) -->
        <aside class="w-64 shrink-0 hidden md:block sticky top-[56px] self-start h-[calc(100vh-56px)] overflow-y-auto">
            <div class="bg-white rounded-lg shadow border border-gray-200">
                <div class="px-4 py-3 border-b border-gray-200 font-semibold">Entities</div>
                <nav class="p-2 space-y-1">
                    <a th:each="e : ${entities}" th:href="${basePath + '/' + e.entityName}"
                       class="block px-3 py-2 rounded hover:bg-gray-100 text-gray-700"
                       th:text="${e.displayName}">Entity</a>
                </nav>
            </div>
        </aside>

        <!-- Main content: scrolls vertically; table area scrolls horizontally -->
        <main class="flex-1 h-[calc(100vh-56px)] flex flex-col overflow-x-hidden">
            <div th:if="${message}" class="mb-4 rounded border border-green-200 bg-green-50 text-green-800 px-4 py-3" th:text="${message}"></div>
            <div th:if="${error}" class="mb-4 rounded border border-red-200 bg-red-50 text-red-800 px-4 py-3" th:text="${error}"></div>
            <div th:insert="${content}" class="flex-1"></div>
        </main>
    </div>
</div>
<script>
// Make any table row with data-href clickable and keyboard accessible
(function(){
  function shouldIgnoreRowNavigation(target) {
    return !!(target && target.closest && target.closest('a, button, input, select, textarea, label, [data-no-row-nav]'));
  }

  function syncSelectAllState() {
    const selectAll = document.getElementById('select-all');
    const checkboxes = Array.from(document.querySelectorAll('.row-selector'));
    const checkedCount = checkboxes.filter(function(box) { return box.checked; }).length;
    const pageCount = checkboxes.length;
    const selectedCount = document.getElementById('selected-count');
    const selectAllMatching = document.getElementById('select-all-matching');
    const selectAllResults = document.getElementById('select-all-results');
    const totalLabel = document.querySelector('[data-total-count]');
    const totalCount = totalLabel ? parseInt(totalLabel.getAttribute('data-total-count') || '0', 10) : checkboxes.length;
    const isAllMatching = selectAllMatching && selectAllMatching.value === 'true';
    const isPageFullySelected = pageCount > 0 && checkedCount === pageCount;

    if (selectedCount) {
      const count = isAllMatching ? totalCount : checkedCount;
      const baseCount = isAllMatching ? totalCount : pageCount;
      selectedCount.textContent = count + ' of ' + baseCount + ' selected';
    }

    if (selectAllResults) {
      if (isAllMatching) {
        selectAllResults.textContent = 'Clear selection';
        selectAllResults.classList.remove('hidden');
      } else {
        selectAllResults.textContent = 'Select all ' + totalCount;
        if (isPageFullySelected && totalCount > pageCount) {
          selectAllResults.classList.remove('hidden');
        } else {
          selectAllResults.classList.add('hidden');
        }
      }
    }

    if (!selectAll || checkboxes.length === 0) {
      return;
    }

    selectAll.checked = checkedCount > 0 && checkedCount === checkboxes.length;
    selectAll.indeterminate = checkedCount > 0 && checkedCount < checkboxes.length;
  }

  document.addEventListener('change', function(e) {
    if (e.target && e.target.id === 'select-all') {
      const checked = e.target.checked;
      document.querySelectorAll('.row-selector').forEach(function(box) {
        box.checked = checked;
      });
      const selectAllMatching = document.getElementById('select-all-matching');
      if (selectAllMatching) {
        selectAllMatching.value = 'false';
      }
      syncSelectAllState();
      return;
    }

    if (e.target && e.target.classList && e.target.classList.contains('row-selector')) {
      const selectAllMatching = document.getElementById('select-all-matching');
      if (selectAllMatching) {
        selectAllMatching.value = 'false';
      }
      syncSelectAllState();
    }
  }, false);

  document.addEventListener('click', function(e) {
    if (e.target && e.target.id === 'select-all-results') {
      e.preventDefault();
      const selectAllMatching = document.getElementById('select-all-matching');
      const checkboxes = Array.from(document.querySelectorAll('.row-selector'));
      const enableAll = !selectAllMatching || selectAllMatching.value !== 'true';

      checkboxes.forEach(function(box) {
        box.checked = enableAll;
      });

      if (selectAllMatching) {
        selectAllMatching.value = enableAll ? 'true' : 'false';
      }

      const selectAll = document.getElementById('select-all');
      if (selectAll) {
        selectAll.checked = enableAll && checkboxes.length > 0;
        selectAll.indeterminate = false;
      }

      syncSelectAllState();
      return;
    }
  }, false);

  document.addEventListener('click', function(e){
    if (shouldIgnoreRowNavigation(e.target)) { return; }
    const tr = e.target.closest && e.target.closest('tr[data-href]');
    if (tr) {
      const href = tr.getAttribute('data-href');
      if (href) { window.location.href = href; }
    }
  }, false);

  document.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === ' ') {
      const el = document.activeElement;
      if (el && el.matches && el.matches('tr[data-href]')) {
        e.preventDefault();
        const href = el.getAttribute('data-href');
        if (href) { window.location.href = href; }
      }
    }
  }, false);

  syncSelectAllState();
})();
</script>
</body>
</html>
